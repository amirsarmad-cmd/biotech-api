[program:api]
command=/bin/sh -c "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:worker]
command=python -m jobs.worker
directory=/app
autostart=true
autorestart=true
startsecs=3
startretries=10
priority=200
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
